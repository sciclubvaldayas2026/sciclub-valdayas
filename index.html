<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sci Club Val d'Ayas">

<!-- Firebase SDKs -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- SheetJS for xlsx parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;--blue-dark:#0C447C;
  --red:#A32D2D;--red-light:#FCEBEB;
  --teal:#0F6E56;--teal-light:#E1F5EE;--teal-mid:#1D9E75;
  --amber:#854F0B;--amber-light:#FAEEDA;--amber-mid:#EF9F27;
  --gray-50:#F4F3EE;--gray-100:#D3D1C7;--gray-400:#888780;--gray-600:#5F5E5A;--gray-900:#2C2C2A;
  --bg:#F4F3EE;--bg-card:#FFFFFF;--border:rgba(0,0,0,0.08);
  --text:#2C2C2A;--text-sec:#5F5E5A;
  --radius:12px;--radius-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--blue-dark)}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
.topbar{background:var(--blue-dark);color:white;padding:52px 16px 14px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:20px;font-weight:600}
.topbar-sub{font-size:12px;opacity:.65;margin-top:2px}
.topbar-green{background:var(--teal)}
.topbar-dark{background:#2C2C2A}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;border:none;color:white;flex-shrink:0}
.navbar{display:flex;background:var(--bg-card);border-top:.5px solid var(--border);padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text-sec);cursor:pointer;padding:4px 0;border:none;background:none}
.nav-item.active{color:var(--blue-dark)}
.nav-icon{font-size:20px;line-height:1}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* LOGIN */
#screen-login{background:var(--blue-dark);justify-content:flex-end}
.login-hero{padding:60px 24px 32px;text-align:center}
.login-logo{width:72px;height:72px;border-radius:20px;overflow:hidden;margin:0 auto 16px}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{color:white;font-size:22px;font-weight:600}
.login-sub{color:rgba(255,255,255,.6);font-size:14px;margin-top:4px}
.login-card{background:var(--bg-card);border-radius:24px 24px 0 0;padding:28px 20px calc(28px + var(--safe-bottom));display:flex;flex-direction:column;gap:16px}
.role-tabs{display:flex;gap:8px}
.role-tab{flex:1;padding:10px;border-radius:var(--radius-sm);border:.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;text-align:center;color:var(--text-sec);background:var(--bg)}
.role-tab.active{background:var(--blue-light);color:var(--blue-dark);border-color:var(--blue-mid)}
.field-label{font-size:12px;color:var(--text-sec);margin-bottom:5px}
.field-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:.5px solid var(--border);font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.field-input:focus{border-color:var(--blue-mid);background:white}
.btn-primary{width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--blue-dark);color:white;font-size:15px;font-weight:600;border:none;cursor:pointer}
.btn-link{text-align:center;font-size:13px;color:var(--text-sec);cursor:pointer}
.btn-link span{color:var(--blue-mid);font-weight:500;cursor:pointer}
.error-msg{background:var(--red-light);color:var(--red);font-size:13px;padding:10px 12px;border-radius:var(--radius-sm);display:none}

/* CHIPS */
.chips-row{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.chips-row::-webkit-scrollbar{display:none}
.chip{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;border:.5px solid var(--border);cursor:pointer;background:var(--bg-card);color:var(--text-sec)}
.chip.active{background:var(--blue-dark);color:white;border-color:var(--blue-dark)}

/* EVENTS */
.month-label{padding:14px 14px 4px;font-size:13px;font-weight:600;color:var(--text-sec)}
.event-card{margin:0 12px 8px;background:var(--bg-card);border-radius:var(--radius);border:.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.event-card.group-start{border-radius:var(--radius) var(--radius) 0 0;margin-bottom:0;border-bottom:none}
.event-card.group-mid{border-radius:0;margin:0 12px;border-top:.5px solid var(--gray-100);border-bottom:none}
.event-card.group-end{border-radius:0 0 var(--radius) var(--radius);margin-bottom:8px;border-top:.5px solid var(--gray-100)}
.event-date{width:42px;text-align:center;flex-shrink:0}
.event-day-num{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.event-day-name{font-size:10px;color:var(--text-sec);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.event-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
.event-info{flex:1;min-width:0}
.event-title{font-size:15px;font-weight:500;color:var(--text)}
.event-sub{font-size:12px;color:var(--text-sec);margin-top:2px}
.event-badge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:500;flex-shrink:0}
.c-sci{background:#E6B800}.c-atletica{background:var(--teal-mid)}.c-multi{background:#E8760A}.c-campus{background:#4AAED9}.c-info{background:var(--gray-400)}
.badge-sci{background:#FFF8CC;color:#7A5500}.badge-atletica{background:var(--teal-light);color:var(--teal)}.badge-multi{background:#FFF0E0;color:#8A3D00}.badge-campus{background:#E0F4FF;color:#1A6A99}.badge-info{background:var(--bg);color:var(--text-sec);border:.5px solid var(--border)}

/* COMM */
.comm-card{margin:0 12px 10px;background:var(--bg-card);border-radius:var(--radius);border:.5px solid var(--border);padding:14px}
.comm-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.comm-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.comm-name{font-size:13px;font-weight:600;color:var(--text)}
.comm-meta{font-size:11px;color:var(--text-sec);margin-top:1px}
.comm-text{font-size:14px;color:var(--text);line-height:1.5}
.comm-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.cat-pill{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-mid);flex-shrink:0}

/* PROFILE */
.profile-section{padding:12px;display:flex;flex-direction:column;gap:10px}
.profile-card{background:var(--bg-card);border-radius:var(--radius);border:.5px solid var(--border);padding:16px}
.profile-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--blue-dark);flex-shrink:0}
.profile-name{font-size:17px;font-weight:600;color:var(--text)}
.profile-email{font-size:12px;color:var(--text-sec);margin-top:2px}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:.5px solid var(--border);font-size:14px}
.profile-row:last-child{border-bottom:none}
.profile-row-label{color:var(--text-sec)}
.profile-row-val{font-weight:500;color:var(--text)}
.athlete-pill{display:inline-flex;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue-dark);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:500;margin:2px}

/* ADMIN STYLES */
.admin-topbar{display:flex;gap:8px;padding:14px;overflow-x:auto;scrollbar-width:none}
.admin-topbar::-webkit-scrollbar{display:none}
.admin-tab{padding:8px 16px;border-radius:8px;background:var(--bg);color:var(--text-sec);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:.5px solid var(--border)}
.admin-tab.active{background:var(--blue-dark);color:white;border-color:var(--blue-dark)}
.admin-section{padding:12px;display:flex;flex-direction:column;gap:12px}
.admin-card{background:var(--bg-card);border-radius:var(--radius);border:.5px solid var(--border);padding:14px}
.admin-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
.request-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:.5px solid var(--border)}
.request-row:last-child{border-bottom:none}
.request-info{flex:1}
.request-name{font-size:14px;font-weight:500;color:var(--text)}
.request-detail{font-size:12px;color:var(--text-sec);margin-top:2px}
.btn-sm{padding:8px 12px;border-radius:6px;border:none;font-size:12px;font-weight:500;cursor:pointer}
.btn-sm-green{background:var(--teal-light);color:var(--teal)}
.btn-sm-red{background:var(--red-light);color:var(--red)}

/* DROP ZONE */
.dropzone{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;background:var(--bg);cursor:pointer;transition:all 0.2s}
.dropzone.active{border-color:var(--blue-mid);background:var(--blue-light)}
.dropzone-text{font-size:13px;color:var(--text-sec);margin-bottom:8px}
.dropzone-file{font-size:12px;color:var(--blue-mid);font-weight:500}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:flex-end}
.modal-overlay.active{display:flex}
.modal-content{background:var(--bg-card);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:24px 20px;padding-bottom:calc(24px + var(--safe-bottom))}
.modal-header{font-size:18px;font-weight:600;color:var(--text);margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;background:var(--bg);border:.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-sec)}

/* ATTENDANCE */
.attendance-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border)}
.attendance-item:last-child{border-bottom:none}
.attendance-checkbox{width:20px;height:20px;border:.5px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0}
.attendance-checkbox.checked{background:var(--blue-dark);border-color:var(--blue-dark)}
.attendance-info{flex:1}
.attendance-name{font-size:14px;font-weight:500;color:var(--text)}
.attendance-detail{font-size:12px;color:var(--text-sec);margin-top:2px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:32px 24px;color:var(--text-sec)}
.empty-state-icon{font-size:32px;margin-bottom:12px}

/* ALERT */
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:none}
.alert.show{display:block}
.alert-success{background:#E1F5EE;color:var(--teal)}
.alert-error{background:var(--red-light);color:var(--red)}

/* FILE INPUT */
input[type="file"]{display:none}

</style>

</head>
<body>

<div id="app">
  <!-- LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="login-hero">
      <div class="login-logo">⛷️</div>
      <div class="login-title">Sci Club Val d'Ayas</div>
      <div class="login-sub">App ufficiale — Stagione 2026/27</div>
    </div>
    <div class="login-card">
      <div class="role-tabs">
        <button class="role-tab active" onclick="switchRole('genitore')">👨‍👩‍👧 Genitore</button>
        <button class="role-tab" onclick="switchRole('allenatore')">🎿 Allenatore</button>
        <button class="role-tab" onclick="switchRole('admin')">⚙️ Admin</button>
      </div>
      <div class="field-label">Email</div>
      <input class="field-input" id="login-email" type="email" placeholder="email@esempio.it">
      <div class="field-label">Password</div>
      <input class="field-input" id="login-pwd" type="password" placeholder="••••••">
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" onclick="loginUser()">Accedi</button>
      <div class="btn-link" style="margin-top:8px">
        Non hai un account? <span onclick="switchToRegister()">Registrati</span>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="screen-register" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">Registrazione</div>
      </div>
      <button class="avatar-btn" onclick="switchToLogin()" style="background:rgba(255,255,255,.1)">←</button>
    </div>
    <div class="content" style="padding:16px;display:flex;flex-direction:column;gap:12px">
      <div class="field-label">Nome e cognome</div>
      <input class="field-input" id="reg-name" placeholder="Giovanni Bianchi">
      <div class="field-label">Email</div>
      <input class="field-input" id="reg-email" type="email" placeholder="email@esempio.it">
      <div class="field-label">Password (min. 6 caratteri)</div>
      <input class="field-input" id="reg-pwd" type="password" placeholder="••••••">
      <div class="field-label">Categoria atleta</div>
      <select class="field-input" id="reg-cat">
        <option value="">-- Seleziona categoria --</option>
        <option value="sbaby">S.Baby</option>
        <option value="baby">Baby</option>
        <option value="cuccioli">Cuccioli</option>
        <option value="ragazzi">Ragazzi</option>
        <option value="allievi">Allievi</option>
        <option value="giovani">Giovani</option>
        <option value="master">Master</option>
        <option value="giovani_fisi">Giovani FISI</option>
      </select>
      <div id="athletes-container" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="btn-primary" style="background:var(--gray-400);margin-top:8px" onclick="addAthleteField()">+ Aggiungi atleta</button>
      <div class="error-msg" id="reg-error"></div>
      <button class="btn-primary" onclick="registerUser()">Invia richiesta</button>
    </div>
  </div>

  <!-- GENITORE -->
  <div id="screen-genitore" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">Calendario</div>
        <div class="topbar-sub" id="genitore-cat-display"></div>
      </div>
      <button class="avatar-btn" onclick="showProfile()">👤</button>
    </div>
    <div class="chips-row">
      <button class="chip active" onclick="filterCategory('all')">Tutto</button>
      <button class="chip" onclick="filterCategory('sbaby')">S.Baby</button>
      <button class="chip" onclick="filterCategory('baby')">Baby</button>
      <button class="chip" onclick="filterCategory('cuccioli')">Cuccioli</button>
      <button class="chip" onclick="filterCategory('ragazzi')">Ragazzi</button>
      <button class="chip" onclick="filterCategory('allievi')">Allievi</button>
      <button class="chip" onclick="filterCategory('giovani')">Giovani</button>
      <button class="chip" onclick="filterCategory('master')">Master</button>
      <button class="chip" onclick="filterCategory('giovani_fisi')">G. FISI</button>
    </div>
    <div class="content" id="genitore-content"></div>
    <div class="navbar">
      <button class="nav-item active" onclick="switchScreen('genitore')"><div class="nav-icon">📅</div><div>Calendario</div></button>
      <button class="nav-item" onclick="switchScreen('comm')"><div class="nav-icon">💬</div><div>Comunicazioni</div></button>
      <button class="nav-item" onclick="showProfile()"><div class="nav-icon">👤</div><div>Profilo</div></button>
    </div>
  </div>

  <!-- ALLENATORE -->
  <div id="screen-allenatore" class="screen">
    <div class="topbar">
      <div>
        <div class="topbar-title">Allenatore</div>
        <div class="topbar-sub" id="allenatore-cat-display"></div>
      </div>
      <button class="avatar-btn" onclick="showProfile()">👤</button>
    </div>
    <div class="chips-row">
      <button class="chip active" onclick="filterAllenatoreCat('all')">Tutte</button>
      <button class="chip" onclick="filterAllenatoreCat('sbaby')">S.Baby</button>
      <button class="chip" onclick="filterAllenatoreCat('baby')">Baby</button>
      <button class="chip" onclick="filterAllenatoreCat('cuccioli')">Cuccioli</button>
      <button class="chip" onclick="filterAllenatoreCat('ragazzi')">Ragazzi</button>
      <button class="chip" onclick="filterAllenatoreCat('allievi')">Allievi</button>
      <button class="chip" onclick="filterAllenatoreCat('giovani')">Giovani</button>
      <button class="chip" onclick="filterAllenatoreCat('master')">Master</button>
      <button class="chip" onclick="filterAllenatoreCat('giovani_fisi')">G. FISI</button>

    <div class="content" id="allenatore-content"></div>
    <div class="navbar">
      <button class="nav-item active" onclick="switchAllenatoreTab('comm')"><div class="nav-icon">💬</div><div>Comunicazioni</div></button>
      <button class="nav-item" onclick="switchAllenatoreTab('calendario')"><div class="nav-icon">📅</div><div>Calendario</div></button>
      <button class="nav-item" onclick="showProfile()"><div class="nav-icon">👤</div><div>Profilo</div></button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="screen-admin" class="screen">
    <div class="topbar topbar-dark">
      <div>
        <div class="topbar-title">⚙️ Amministrazione</div>
      </div>
      <button class="avatar-btn" onclick="logoutUser()">Esci</button>
    </div>
    <div class="admin-topbar">
      <button class="admin-tab active" onclick="switchAdminTab('import')">📥 Importa</button>
      <button class="admin-tab" onclick="switchAdminTab('atleti')">👥 Atleti</button>
      <button class="admin-tab" onclick="switchAdminTab('categorie')">🏷️ Categorie</button>
      <button class="admin-tab" onclick="switchAdminTab('utenti')">🔑 Utenti</button>
      <button class="admin-tab" onclick="switchAdminTab('medici')">🏥 Medici</button>
      <button class="admin-tab" onclick="switchAdminTab('events')">📌 Eventi</button>
    </div>
    <div class="content" id="admin-content"></div>
    <div class="navbar">
      <button class="nav-item" onclick="logoutUser()"><div class="nav-icon">🚪</div><div>Esci</div></button>
    </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content" id="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div id="profile-modal" class="modal-overlay">
    <div class="modal-content" id="profile-content">
      <button class="modal-close" onclick="closeProfile()">×</button>
      <div id="profile-body"></div>
    </div>
  </div>

</div>

<script>
// ============ FIREBASE CONFIG ============
const firebaseConfig = {
  apiKey: "AIzaSyAb7GSGVmfDEgoRlv6-sx5JHZv3GNfsToU",
  authDomain: "sciclub-valdayas.firebaseapp.com",
  projectId: "sciclub-valdayas",
  storageBucket: "sciclub-valdayas.firebasestorage.app",
  messagingSenderId: "402983337756",
  appId: "1:402983337756:web:bbe2e6a4b0b7a17431c4d9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============ GLOBAL STATE ============
let currentUser = null;
let userRole = 'genitore';
let selectedCategory = 'all';
let selectedAllenatoreCat = 'all';
let allenatoreTab = 'comm';
let adminTab = 'import';
let importedAthletes = {};

const CAT_LABELS = {
  'sbaby': 'S.Baby',
  'baby': 'Baby',
  'cuccioli': 'Cuccioli',
  'ragazzi': 'Ragazzi',
  'allievi': 'Allievi',
  'giovani': 'Giovani',
  'master': 'Master',
  'giovani_fisi': 'Giovani FISI'
};

const CAT_ORDER = ['sbaby', 'baby', 'cuccioli', 'ragazzi', 'allievi', 'giovani', 'master', 'giovani_fisi'];

// ============ AUTH ============
auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    loadUserAndShowScreen();
  } else {
    showScreen('login');
  }
});

function switchRole(role) {
  userRole = role;
  document.querySelectorAll('.role-tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
}

function loginUser() {
  var email = document.getElementById('login-email').value.trim();
  var pwd = document.getElementById('login-pwd').value;
  var err = document.getElementById('login-error');
  err.style.display = 'none';
  
  if (!email || !pwd) {
    err.style.display = 'block';
    err.textContent = 'Compila email e password.';
    return;
  }
  
  auth.signInWithEmailAndPassword(email, pwd)
    .then(function(cred) {
      currentUser = cred.user;
      loadUserAndShowScreen();
    })
    .catch(function(e) {
      err.style.display = 'block';
      err.textContent = 'Email o password errate.';
    });
}

function loadUserAndShowScreen() {
  db.collection('users').doc(currentUser.uid).get().then(function(snap) {
    if (snap.exists) {
      var userData = snap.data();
      if (userData.role === 'admin') {
        showScreen('admin');
        switchAdminTab('import');
      } else if (userData.role === 'allenatore') {
        showScreen('allenatore');
        loadAllenatoreData();
      } else {
        showScreen('genitore');
        loadGenitoreData();
      }
    }
  });
}

function registerUser() {
  var name = document.getElementById('reg-name').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var pwd = document.getElementById('reg-pwd').value;
  var cat = document.getElementById('reg-cat').value;

  if (!name || !email || pwd.length < 6 || !cat) {

  auth.createUserWithEmailAndPassword(email, pwd)
    .then(function(cred) {

      return db.collection('users').doc(cred.user.uid).set({
        email: email,
        displayName: name,
        role: 'genitore',
        status: 'pending',
        categories: [cat],

function saveAttendance(eventId, category, date) {
  var attendance = {};
  document.querySelectorAll('.attendance-checkbox.checked').forEach(function(el) {
    var athleteId = el.dataset.athleteId;
    attendance[athleteId] = true;
  });
  
  var extraName = document.getElementById('extra-athlete-name').value.trim();
  var extraCheck = document.getElementById('extra-athlete-check').checked;
  
  if (extraName && extraCheck) {
    attendance['extra_' + Date.now()] = { name: extraName, extra: true };
  }
  
  db.collection('attendance').doc(eventId + '_' + category).set({
    eventId: eventId,
    category: category,
    date: date,
    attendance: attendance,
    recordedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    alert('Presenze salvate!');
    closeModal();
    loadAllenatoreData();

function handleDragOver(e) {
  e.preventDefault();
  e.target.closest('.dropzone').classList.add('active');
}

function handleDragLeave(e) {
  e.target.closest('.dropzone').classList.remove('active');
}

function handleFileDrop(e) {
  e.preventDefault();
  e.target.closest('.dropzone').classList.remove('active');
  var files = e.dataTransfer.files;
  if (files.length) processFile(files[0]);
}

function handleFileSelect(e) {
  if (e.target.files.length) processFile(e.target.files[0]);
}

function processFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array' });
      
      importedAthletes = {};
      
      workbook.SheetNames.forEach(function(sheetName) {
        var sheet = workbook.Sheets[sheetName];
        var rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
        
        var catKey = sheetName.toLowerCase()
          .replace(/\s+/g, '_')
          .replace('super_baby', 'sbaby')
          .replace('giovani_fisi', 'giovani_fisi');
        
        if (!CAT_ORDER.includes(catKey)) {
          // Prova mappatura alternativa
          if (sheetName === 'SUPERBABY') catKey = 'sbaby';
          else if (sheetName === 'GIOVANI FISI') catKey = 'giovani_fisi';
          else {
            catKey = CAT_ORDER.find(c => CAT_LABELS[c].toLowerCase() === sheetName.toLowerCase());
          }
        }
        
        if (catKey) {
          var athletes = [];
          rows.forEach(function(row) {
            if (row.COGNOME && row.NOME) {
              athletes.push({
                surname: row.COGNOME.trim(),
                name: row.NOME.trim(),
                birthDate: row['DATA DI NASCITA'] || '',
                medicalExpiry: row['SCADENZA CM'] || ''
              });
            }
          });
          
          if (athletes.length > 0) {
            importedAthletes[catKey] = athletes;
          }
        }
      });
      
      // Salva su Firestore
      db.collection('config').doc('athletes').set({
        athletes: importedAthletes,
        importedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        updateImportSummary();
        document.getElementById('import-status').innerHTML = '<div class="alert alert-success show">✓ File importato con successo!</div>';
      });
    } catch (err) {
      document.getElementById('import-status').innerHTML = '<div class="alert alert-error show">✗ Errore nell\'importazione: ' + err.message + '</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function updateImportSummary() {
  var total = 0;
  var summary = '';
  CAT_ORDER.forEach(function(cat) {
    var count = (importedAthletes[cat] || []).length;
    if (count > 0) {
      total += count;
      summary += '<div style="padding:8px 0;border-bottom:.5px solid var(--border)">' + CAT_LABELS[cat] + ': <strong>' + count + ' atleti</strong></div>';
    }
  });
  
  if (summary) {
    summary = '<div style="margin-bottom:8px"><strong>Totale: ' + total + ' atleti</strong></div>' + summary;
  }
  
  document.getElementById('imported-summary').innerHTML = summary || 'Nessun atleta importato.';
}

        html += '<div class="request-row">' +
          '<div class="request-info"><div class="request-name">' + (u.displayName || u.email) + '</div></div>' +
          '<button class="btn-sm btn-sm-green" onclick="approveUser(\'' + u.id + '\')">Riattiva</button>' +
          '</div>';
      });
      html += '</div>';
    }
    
    html += '</div>';
    document.getElementById('admin-content').innerHTML = html;
  });
}

function approveUser(uid) {
  db.collection('users').doc(uid).update({ status: 'approved' }).then(function() {
    renderUtentiTab();
  });
}

function suspendUser(uid) {
  if (confirm('Sospendere questo account?')) {
    db.collection('users').doc(uid).update({ status: 'rejected' }).then(function() {
      renderUtentiTab();
    });
  }
}

function renderMediciTab() {
  var html = '<div class="admin-section"><div class="admin-card">' +
    '<div class="admin-card-title">🏥 Certificati medici</div>' +
    '<div style="font-size:13px;color:var(--text-sec);margin-bottom:12px">Gestisci scadenze dei certificati medici per categoria.</div>';
  
  CAT_ORDER.forEach(function(cat) {
    var athletes = importedAthletes[cat] || [];
    var scaduti = athletes.filter(a => {
      if (!a.medicalExpiry) return false;
      var exp = new Date(a.medicalExpiry);
      return exp < new Date();
    }).length;
    
    var inScadenza = athletes.filter(a => {
      if (!a.medicalExpiry) return false;
      var exp = new Date(a.medicalExpiry);
      var diff = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
      return diff >= 0 && diff < 30;
    }).length;
    
    html += '<div class="request-row">' +
      '<div class="request-info">' +
      '<div class="request-name">' + CAT_LABELS[cat] + '</div>' +
      '<div class="request-detail">🔴 Scaduti: ' + scaduti + ' | 🟡 In scadenza: ' + inScadenza + '</div>' +
      '</div>' +
      '<button class="btn-sm btn-sm-green" onclick="openMediciModal(\'' + cat + '\')">Dettagli</button>' +
      '</div>';
  });
  
  html += '</div></div>';
  document.getElementById('admin-content').innerHTML = html;
}

function openMediciModal(cat) {
  var athletes = importedAthletes[cat] || [];
  var html = '<div class="modal-header">' + CAT_LABELS[cat] + ' - Certificati medici</div>';
  
  var byStatus = { scaduti: [], inScadenza: [], validi: [], nonInseriti: [] };
  
  athletes.forEach(function(a) {
    if (!a.medicalExpiry) {
      byStatus.nonInseriti.push(a);
    } else {
      var exp = new Date(a.medicalExpiry);
      var diff = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
      if (diff < 0) byStatus.scaduti.push(a);
      else if (diff < 30) byStatus.inScadenza.push(a);
      else byStatus.validi.push(a);
    }
  });
  
  var sections = [
    { title: 'Scaduti', data: byStatus.scaduti, color: 'var(--red)' },
    { title: 'In scadenza', data: byStatus.inScadenza, color: 'var(--amber-mid)' },
    { title: 'Validi', data: byStatus.validi, color: 'var(--teal)' },
    { title: 'Non inseriti', data: byStatus.nonInseriti, color: 'var(--gray-400)' }
  ];
  
  sections.forEach(function(sec) {
    if (sec.data.length > 0) {
      html += '<div style="margin-top:16px"><div style="font-size:13px;font-weight:600;color:' + sec.color + ';">' + sec.title + ' (' + sec.data.length + ')</div>';
      sec.data.forEach(function(a) {
        html += '<div class="request-row">' +
          '<div class="request-info">' +
          '<div class="request-name">' + a.name + ' ' + a.surname + '</div>' +
          '<div class="request-detail">' + (a.medicalExpiry ? new Date(a.medicalExpiry).toLocaleDateString('it-IT') : 'N/A') + '</div>' +
          '</div></div>';
      });
      html += '</div>';
    }
  });
  
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function renderEventsTab() {
  db.collection('events').orderBy('date').get().then(function(snap) {
    var events = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
    
    var html = '<div class="admin-section"><div class="admin-card">' +
      '<div class="admin-card-title">📌 Gestione eventi</div>';
    
    events.forEach(function(e) {
      html += '<div class="request-row">' +
        '<div class="request-info">' +
        '<div class="request-name">' + e.title + '</div>' +
        '<div class="request-detail">' + new Date(e.date).toLocaleDateString('it-IT') + ' - ' + (CAT_LABELS[e.category] || e.category) + '</div>' +
        '</div>' +
        '<button class="btn-sm btn-sm-red" onclick="deleteEvent(\'' + e.id + '\')">Elimina</button>' +
        '</div>';
    });
    
    html += '<div style="margin-top:16px"><button class="btn-primary" style="background:var(--teal)" onclick="openNewEventModal()">+ Nuovo evento</button></div>' +
      '</div></div>';
    
    document.getElementById('admin-content').innerHTML = html;
  });
}

function deleteEvent(eventId) {
  if (confirm('Eliminare questo evento?')) {
    db.collection('events').doc(eventId).delete().then(function() {
      renderEventsTab();
    });
  }
}

function openNewEventModal() {
  var html = '<div class="modal-header">Nuovo evento</div>' +
    '<div class="field-label">Titolo</div>' +
    '<input class="field-input" id="new-event-title" placeholder="Nome evento">' +
    '<div class="field-label">Data</div>' +
    '<input class="field-input" id="new-event-date" type="date">' +
    '<div class="field-label">Categoria</div>' +
    '<select class="field-input" id="new-event-cat">' +
    CAT_ORDER.map(c => '<option value="' + c + '">' + CAT_LABELS[c] + '</option>').join('') +
    '</select>' +
    '<div class="field-label">Tipo attività</div>' +
    '<select class="field-input" id="new-event-type">' +
    '<option value="sci">Sci</option><option value="atletica">Atletica</option>' +
    '<option value="multi">Multisport</option><option value="campus">Campus</option>' +
    '<option value="info">Info</option>' +
    '</select>' +
    '<button class="btn-primary" style="background:var(--teal);margin-top:12px" onclick="saveNewEvent()">Crea evento</button>';
  
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function saveNewEvent() {
  var title = document.getElementById('new-event-title').value.trim();
  var date = document.getElementById('new-event-date').value;
  var cat = document.getElementById('new-event-cat').value;
  var type = document.getElementById('new-event-type').value;
  
  if (!title || !date || !cat) {
    alert('Compila tutti i campi');
    return;
  }
  
  db.collection('events').add({
    title: title,
    date: date,
    category: cat,
    type: type,
    color: '#888',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    alert('Evento creato!');
    closeModal();
    renderEventsTab();
  });
}

// ============ MODAL FUNCTIONS ============
function openEventModal(el) {
  var title = el.querySelector('.event-title').textContent;
  var html = '<div class="modal-header">' + title + '</div>' +
    '<div style="font-size:13px;color:var(--text-sec);margin-bottom:12px">' + el.querySelector('.event-day-num').textContent + ' ' + el.querySelector('.event-day-name').textContent + '</div>' +
    (el.querySelector('.event-sub') ? '<div style="margin-bottom:12px">' + el.querySelector('.event-sub').textContent + '</div>' : '');
  
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function showProfile() {
  db.collection('users').doc(currentUser.uid).get().then(function(snap) {
    var userData = snap.data();
    var html = '<div class="modal-header">Profilo</div>' +
      '<div class="profile-header" style="border-bottom:.5px solid var(--border);padding-bottom:12px">' +
      '<div class="profile-avatar">' + (userData.displayName || 'U').charAt(0) + '</div>' +
      '<div><div class="profile-name">' + (userData.displayName || userData.email) + '</div>' +
      '<div class="profile-email">' + userData.email + '</div></div></div>';
    
    if (userData.role === 'genitore') {
      html += '<div style="margin-top:16px"><strong>Atleti</strong></div>';
      (userData.athletes || []).forEach(function(a) {
        html += '<div class="athlete-pill">' + a.name + ' - ' + (CAT_LABELS[a.category] || a.category) + '</div>';
      });
    }
    
    html += '<button class="btn-primary" style="margin-top:16px" onclick="logoutUser()">Esci dall\'account</button>';
    
    document.getElementById('profile-body').innerHTML = html;
    document.getElementById('profile-modal').classList.add('active');
  });
}

function closeProfile() {
  document.getElementById('profile-modal').classList.remove('active');
}

// ============ INIT ============ 
window.addEventListener('load', function() {
  // Carica config da Firestore
  db.collection('config').doc('athletes').get().then(function(snap) {
    if (snap.exists) {
      importedAthletes = snap.data().athletes || {};
    }
  });
});

</script>
